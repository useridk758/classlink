<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeLink | Connect Smarter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-ui" class="container">
        <header>
            <h1 class="logo">Grade<span>Link</span></h1>
            <p>Access your favorite educational resources instantly.</p>
        </header>
        
        <main>
            <form id="request-form">
                <input type="text" id="user-input" placeholder="Enter URL or search query..." required autocomplete="off">
                <button type="submit">Go</button>
            </form>
            
            <div class="quick-links">
                <button class="chip" onclick="quickLink('https://www.discord.com')">Discord</button>
                <button class="chip" onclick="quickLink('https://www.youtube.com')">YouTube</button>
                <button class="chip" onclick="quickLink('https://www.tiktok.com')">TikTok</button>
            </div>
        </main>
    </div>

    <div id="viewer-container" class="hidden">
        <div class="viewer-nav">
            <button id="back-btn">Back to Home</button>
            <span id="current-url-display"></span>
        </div>
        <iframe id="content-frame" src=""></iframe>
    </div>

    <footer class="transparent-footer">
        <p>&copy; 2026 GradeLink Hub</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
