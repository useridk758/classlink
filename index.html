<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeLink | Connect Smarter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Grade<span>Link</span></h1>
            <p>Access your favorite educational resources instantly.</p>
        </header>
        
        <main>
            <form id="request-form">
                <input type="text" id="user-input" placeholder="Enter URL or search query..." required>
                <button type="submit">Go</button>
            </form>
            
            <div class="quick-links">
                <button class="chip">Discord</button>
                <button class="chip">YouTube</button>
                <button class="chip">TikTok</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 GradeLink Hub</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
